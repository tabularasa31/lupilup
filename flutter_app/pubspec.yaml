name: lupilup_flutter
description: Flutter client for the lupilup yarn inventory app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.3
  supabase_flutter: ^2.6.0
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.1.0
  flutter_web_auth_2: ^4.0.0
  image_picker: ^1.1.2
  uuid: ^4.5.1
  intl: ^0.19.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
